name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test --dart-define=EXCHANGE_API_BASE_URL=http://localhost:3000

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: flutter
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: stock-exchange-fe-production
      cancel-in-progress: false
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
      - name: Flutter Web 운영 빌드
        run: >-
          flutter build web --release
          --dart-define=EXCHANGE_API_BASE_URL=https://api.harmonymts.site
          --dart-define=WEB_PUSH_VAPID_PUBLIC_KEY=${{ secrets.WEB_PUSH_VAPID_PUBLIC_KEY }}
      - name: Vercel Build Output 생성
        run: bash scripts/prepare-vercel-output.sh
      - name: Vercel CLI 설치
        run: npm install --global vercel@56.1.0
      - name: Vercel 프로젝트 연결
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
      - name: 운영 배포
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
