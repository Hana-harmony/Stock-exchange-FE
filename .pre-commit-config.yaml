minimum_pre_commit_version: 3.2.0

default_install_hook_types:
  - pre-commit
  - pre-push

default_stages:
  - pre-commit

exclude: |
  (?x)^(
    \.dart_tool/|
    \.idea/|
    build/|
    android/\.gradle/|
    ios/Pods/|
    ios/Flutter/ephemeral/|
    ios/Flutter/Generated\.xcconfig|
    ios/Flutter/flutter_export_environment\.sh
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args:
          - --markdown-linebreak-ext=md
      - id: check-added-large-files
        args:
          - --maxkb=2048

  - repo: local
    hooks:
      - id: dart-format
        name: dart format
        entry: dart format
        language: system
        files: \.dart$
        stages:
          - pre-commit
          - manual

      - id: flutter-analyze
        name: flutter analyze
        entry: flutter analyze
        language: system
        always_run: true
        pass_filenames: false
        stages:
          - pre-push
          - manual

      - id: flutter-test
        name: flutter test
        entry: flutter test
        language: system
        always_run: true
        pass_filenames: false
        stages:
          - pre-push
          - manual
